<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wer bin ich?</title>
    <link rel="icon" type="image/png" href="images/favicon.png" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="startup-screen" id="startupScreen">
      <div class="startup-container">
        <div class="emoji-animation">&#128062;</div>
        <h1>Wer bin ich?</h1>
        <p>Ich gebe dir Hinweise - kannst du erraten, welches Tier ich bin?</p>
        <button class="start-btn" id="startBtn">Spiel starten</button>
      </div>
    </div>

    <div class="game-screen" id="gameScreen">
      <div class="game-header">
        <h2 id="progressText">
          Karte <span id="currentCard">1</span> /
          <span id="totalCards">10</span>
        </h2>
        <button class="home-btn" id="homeBtn">Startseite</button>
      </div>

      <div class="card-container">
        <div class="card" id="card">
          <div class="card-inner">
            <div class="card-front">
              <div class="card-content">
                <span class="hint-icon">?</span>
                <p id="questionText">Wer bin ich?</p>
              </div>
            </div>

            <div class="card-back">
              <div class="card-content">
                <img
                  class="animal-image"
                  id="animalImage"
                  src="images/dog.svg"
                  alt="Hund"
                />
                <p id="answerText">Hund</p>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="navigation">
        <button class="nav-btn prev-btn" id="prevBtn">&larr; Zurueck</button>
        <button class="nav-btn next-btn" id="nextBtn">Weiter &rarr;</button>
      </div>

      <div class="swipe-hint" id="swipeHint">
        Wisch links oder rechts, um zur naechsten Karte zu gehen
      </div>

      <div class="complete-overlay" id="completeOverlay">
        <div class="complete-modal">
          <div class="emoji-animation-large">&#127881;</div>
          <h2>Glueckwunsch!</h2>
          <p>Du hast das Spiel abgeschlossen.</p>
          <button class="restart-btn" id="restartBtn">Erneut spielen</button>
        </div>
      </div>
    </div>

    <script src="animals.js"></script>
    <script src="script.js"></script>
  </body>
</html>
