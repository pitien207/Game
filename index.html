<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🐾 Tiere Erraten</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Startup Screen -->
    <div class="startup-screen" id="startupScreen">
      <div class="startup-container">
        <div class="emoji-animation">🐾</div>
        <h1>Tiere Erraten</h1>
        <p>
          Errate, welches Tier es ist, basierend auf dem Rätsel, bevor du die
          Karte umdrehst!
        </p>
        <button class="start-btn" id="startBtn">Spiel Starten</button>
      </div>
    </div>

    <!-- Game Screen -->
    <div class="game-screen" id="gameScreen">
      <!-- Header -->
      <div class="game-header">
        <h2 id="progressText">
          Karte <span id="currentCard">1</span> /
          <span id="totalCards">10</span>
        </h2>
        <button class="home-btn" id="homeBtn">Startseite</button>
      </div>

      <!-- Card Container -->
      <div class="card-container">
        <div class="card" id="card">
          <div class="card-inner">
            <!-- Front (Question) -->
            <div class="card-front">
              <div class="card-content">
                <span class="hint-icon">❓</span>
                <p id="questionText">Wer bin ich?</p>
                <span class="tap-hint">Tippen zum Umdrehen</span>
              </div>
            </div>
            <!-- Back (Animal) -->
            <div class="card-back">
              <div class="card-content">
                <div class="animal-image" id="animalEmoji"></div>
                <p id="answerText">Hund</p>
                <span class="tap-hint">Tippen zur Antwort</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Navigation Arrows -->
      <div class="navigation">
        <button class="nav-btn prev-btn" id="prevBtn">← Zurück</button>
        <button class="nav-btn next-btn" id="nextBtn">Weiter →</button>
      </div>

      <!-- Swipe Indicator -->
      <div class="swipe-hint" id="swipeHint">
        Wisch links/rechts, um zur nächsten Karte zu gehen
      </div>

      <!-- Complete Screen -->
      <div class="complete-overlay" id="completeOverlay">
        <div class="complete-modal">
          <div class="emoji-animation-large">🎉</div>
          <h2>Glückwunsch!</h2>
          <p>Du hast das Spiel abgeschlossen</p>
          <button class="restart-btn" id="restartBtn">Erneut Spielen</button>
        </div>
      </div>
    </div>

    <script src="animals.js"></script>
    <script src="script.js"></script>
  </body>
</html>
